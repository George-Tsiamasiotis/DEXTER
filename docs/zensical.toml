[project]
site_name = "DEXTER Documentation"
site_url = "https://dexter.tsiamasiotis.gr/"
repo_url = "https://github.com/George-Tsiamasiotis/DEXTER"
site_author = "George Tsiamasiotis"
docs_dir = "docs"
site_dir = "site"
repo_name = "DEXTER"
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

[project.theme]
variant = "modern"
font.code = "Jetbrains Mono"
features = [
    "navigation.path",
    "navigation.top",
    "navigation.instant.progress",
    "navigation.tracking",
    "content.tooltips",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
    "toc.follow",
]

[[project.theme.palette]]
primary = "teal"
accent = "indigo"
scheme = "slate"

# ======================

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["py-dexter"]

[project.plugins.mkdocstrings.handlers.python.options]
# general
show_bases = false
show_inheritance_diagram = false
show_source = false
# headings
show_root_heading = true
show_root_members_full_path = false
show_object_full_path = true
show_symbol_type_heading = true
show_symbol_type_toc = true
type_parameter_headings = true
# Members
show_labels = true
summary.functions = true
summary.attributes = true
# docstrings
docstring_style = "numpy"
docstring_section_style = "list"
inherited_members = true
docstring_options.ignore_init_summary = false
docstring_options.trim_doctest_flags = true
merge_init_into_class = true
members_order = "source"
unwrap_annotated = true
# Signatures
annotations_path = "source"
modernize_annotations = false
show_signature_annotations = true
signature_crossrefs = true

# ======================

[project.markdown_extensions.zensical.extensions.preview]
configurations = [
    { targets.include = [
        "customization.md",
        "setup/extensions/*"
    ]}
]

[project.markdown_extensions.abbr]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.toc]
permalink = true
toc_depth = 3
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
